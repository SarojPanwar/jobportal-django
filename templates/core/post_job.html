{% extends "core/base.html" %}
{% block title %}Post a Job – JobConnect{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="form-card">
        <div class="form-card-header">
          <h3 class="fw-bold mb-0"><i class="bi bi-plus-circle me-2 text-primary"></i>Post a New Job</h3>
          <p class="text-muted mb-0">Fill in the details to attract the best candidates</p>
        </div>
        <div class="form-card-body">
          <form method="POST" action="{% url 'core:post_job' %}">
            {% csrf_token %}
            <div class="row g-4">
              <div class="col-md-8">
                <label class="form-label fw-semibold">Job Title *</label>
                <input type="text" name="title" class="form-control" placeholder="e.g. Senior Python Developer" required/>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold">Job Type *</label>
                <select name="job_type" class="form-select" required>
                  <option value="Full-time">Full-time</option>
                  <option value="Part-time">Part-time</option>
                  <option value="Remote">Remote</option>
                  <option value="Contract">Contract</option>
                  <option value="Internship">Internship</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Company Name *</label>
                <input type="text" name="company" class="form-control" placeholder="Your company name" required/>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Location *</label>
                <input type="text" name="location" class="form-control" placeholder="e.g. New York, NY or Remote" required/>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Category *</label>
                <select name="category" class="form-select" required>
                  <option value="">Select category...</option>
                  <option>Technology</option><option>Marketing</option><option>Design</option>
                  <option>Finance</option><option>Healthcare</option><option>Education</option>
                  <option>Sales</option><option>Engineering</option><option>HR</option><option>Management</option>
                  <option>Other</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Salary Range</label>
                <input type="text" name="salary" class="form-control" placeholder="e.g. $60,000 – $80,000/yr"/>
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">Job Description *</label>
                <textarea name="description" class="form-control" rows="6"
                  placeholder="Describe the role, responsibilities, and what a typical day looks like..." required></textarea>
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">Requirements</label>
                <textarea name="requirements" class="form-control" rows="4"
                  placeholder="List qualifications, skills, and experience needed..."></textarea>
              </div>
              <div class="col-12 d-flex gap-3">
                <button type="submit" class="btn btn-primary btn-lg">
                  <i class="bi bi-check-circle me-2"></i>Post Job
                </button>
                <a href="{% url 'core:dashboard' %}" class="btn btn-outline-secondary btn-lg">Cancel</a>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
