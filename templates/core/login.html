{% extends "core/base.html" %}
{% block title %}Login – JobConnect{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-80">
      <div class="col-md-5">
        <div class="auth-card">
          <div class="auth-logo">
            <i class="bi bi-briefcase-fill"></i>
            Job<span>Connect</span>
          </div>
          <h2 class="auth-title">Welcome Back</h2>
          <p class="auth-sub">Sign in to your account to continue</p>

          <form method="POST" action="{% url 'core:login' %}">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <div class="input-icon">
                <i class="bi bi-envelope"></i>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required/>
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label">Password</label>
              <div class="input-icon">
                <i class="bi bi-lock"></i>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg">
              <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
          </form>

          <div class="auth-divider"><span>New to JobConnect?</span></div>
          <a href="{% url 'core:register' %}" class="btn btn-outline-primary w-100">
            <i class="bi bi-person-plus me-2"></i>Create an Account
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
