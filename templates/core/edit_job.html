{% extends "core/base.html" %}
{% block title %}Edit Job – JobConnect{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="form-card">
        <div class="form-card-header">
          <h3 class="fw-bold mb-0"><i class="bi bi-pencil me-2 text-primary"></i>Edit Job Listing</h3>
          <p class="text-muted mb-0">Update the details for "{{ job.title }}"</p>
        </div>
        <div class="form-card-body">
          <form method="POST">
            {% csrf_token %}
            <div class="row g-4">
              <div class="col-md-8">
                <label class="form-label fw-semibold">Job Title *</label>
                <input type="text" name="title" class="form-control" value="{{ job.title }}" required/>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold">Job Type *</label>
                <select name="job_type" class="form-select" required>
                  {% for jt in 'Full-time,Part-time,Remote,Contract,Internship'|split:',' %}
                  <option value="{{ jt }}" {% if job.job_type == jt %}selected{% endif %}>{{ jt }}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Company Name *</label>
                <input type="text" name="company" class="form-control" value="{{ job.company }}" required/>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Location *</label>
                <input type="text" name="location" class="form-control" value="{{ job.location }}" required/>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Category *</label>
                <select name="category" class="form-select" required>
                  {% for cat in 'Technology,Marketing,Design,Finance,Healthcare,Education,Sales,Engineering,HR,Management,Other'|split:',' %}
                  <option value="{{ cat }}" {% if job.category == cat %}selected{% endif %}>{{ cat }}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Salary Range</label>
                <input type="text" name="salary" class="form-control" value="{{ job.salary|default:'' }}"/>
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">Job Description *</label>
                <textarea name="description" class="form-control" rows="6" required>{{ job.description }}</textarea>
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">Requirements</label>
                <textarea name="requirements" class="form-control" rows="4">{{ job.requirements|default:'' }}</textarea>
              </div>
              <div class="col-12 d-flex gap-3">
                <button type="submit" class="btn btn-primary btn-lg">
                  <i class="bi bi-check-circle me-2"></i>Save Changes
                </button>
                <a href="{% url 'core:dashboard' %}" class="btn btn-outline-secondary btn-lg">Cancel</a>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
